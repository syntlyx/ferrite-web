name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check updater asset
        run: |
          tar -czf dist.tar.gz dist
          tar -tzf dist.tar.gz | sed -n '1,8p'
