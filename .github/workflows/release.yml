name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Pack Ferrite web asset
        run: |
          tar -czf dist.tar.gz dist
          tar -tzf dist.tar.gz | sed -n '1,8p'

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          release_args=(--title "${tag}" --notes "" --target "${GITHUB_SHA}")
          if [[ "${tag}" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist.tar.gz --clobber
          else
            gh release create "${tag}" dist.tar.gz "${release_args[@]}"
          fi
